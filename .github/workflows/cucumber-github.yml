name: AgileTest Sync - Cucumber JS

on:
  workflow_dispatch:
    inputs:
      TEST_EXECUTION_KEY:
        description: "Test Execution Key from Jira"
      PROJECT_KEY:
        description: "Project Key từ Jira truyền sang"

env:
  BASE_URL: ${{ vars.BASE_URL }}
  BASE_AUTH_URL: ${{ vars.BASE_AUTH_URL }}
  CLIENT_ID: ${{ secrets.CLIENT_ID }}
  CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
  PROJECT_KEY: ${{ github.event.inputs.PROJECT_KEY || vars.PROJECT_KEY }}

jobs:
  run-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Create reports directory
        run: mkdir -p reports

      - name: Execute Cucumber Tests
        run: npm test

      - name: Check report file
        if: always()
        run: cat reports/cucumber-report.json

      - name: Submit to AgileTest
        if: always()
        run: |
          # 1. Lấy token xác thực
          TOKEN=$(curl -s "$BASE_AUTH_URL/api/apikeys/authenticate" \
            -H 'Content-Type:application/json' \
            -d "{\"clientId\":\"$CLIENT_ID\",\"clientSecret\":\"$CLIENT_SECRET\"}" | tr -d '"')

          if [ -z "$TOKEN" ] || [ "$TOKEN" == "null" ]; then
            echo "Token rỗng!"
            exit 1
          fi

          # 2. Upload kết quả Cucumber (JSON)
          if [ -n "${{ github.event.inputs.TEST_EXECUTION_KEY }}" ]; then
            echo "Upload vào Test Execution: ${{ github.event.inputs.TEST_EXECUTION_KEY }}"
            curl -X POST "$BASE_URL/ds/test-executions/cucumber?projectKey=$PROJECT_KEY&testExecutionKey=${{ github.event.inputs.TEST_EXECUTION_KEY }}" \
              -H "Content-Type:application/json" \
              -H "Authorization:JWT $TOKEN" \
              --data-binary "@reports/cucumber-report.json"
          else
            echo "Tạo mới Test Execution"
            curl -X POST "$BASE_URL/ds/test-executions/cucumber?projectKey=$PROJECT_KEY" \
              -H "Content-Type:application/json" \
              -H "Authorization:JWT $TOKEN" \
              --data-binary "@reports/cucumber-report.json"
          fi

      - name: Update Pipeline Status
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            RESULT="success"
          else
            RESULT="failed"
          fi

          TOKEN=$(curl -s "$BASE_AUTH_URL/api/apikeys/authenticate" \
            -X POST -H 'Content-Type:application/json' \
            -d "{\"clientId\":\"$CLIENT_ID\",\"clientSecret\":\"$CLIENT_SECRET\"}" | tr -d '"')

          JOB_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          if [ -n "${{ github.event.inputs.TEST_EXECUTION_KEY }}" ]; then
            curl -X POST "$BASE_AUTH_URL/ds/test-executions/${{ github.event.inputs.TEST_EXECUTION_KEY }}/pipeline/history?projectKey=$PROJECT_KEY" \
              -H "Content-Type: application/json" \
              -H "Authorization: JWT $TOKEN" \
              --data "{
                \"jobURL\": \"$JOB_URL\",
                \"repository\": \"${{ github.repository }}\",
                \"tool\": \"github\",
                \"result\": \"$RESULT\"
              }"
          fi
